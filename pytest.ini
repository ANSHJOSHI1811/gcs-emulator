[pytest]
# PyTest Configuration for GCS Emulator Tests

# Minimum Python version
minversion = 6.0

# Test discovery patterns
testpaths = tests/unit tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add current options
addopts = 
    --strict-markers
    --tb=short
    -ra
    -v

# Markers for test categorization
markers =
    unit: Run unit tests (fast)
    integration: Run integration tests (slower)
    e2e: Run end-to-end tests (slowest)
    slow: Mark test as slow running
    api: API endpoint tests
    gcloud: gcloud CLI tests
    firewall: Firewall-related tests
    compute: Compute Engine tests
    storage: Cloud Storage tests
    vpc: VPC/Networking tests
    iam: IAM tests
    gke: GKE tests
    cloudrun: Cloud Run tests
    artifacts: Artifact Registry tests
    monitoring: Monitoring tests
    pubsub: Pub/Sub tests
    autoscaling: Autoscaling tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage
[coverage:run]
branch = True
source = backend/app

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
