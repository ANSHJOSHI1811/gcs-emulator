version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gcs-emulator-postgres
    environment:
      POSTGRES_USER: gcs_user
      POSTGRES_PASSWORD: gcs_password
      POSTGRES_DB: gcs_emulator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gcs_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gcs-network

  gcs-emulator:
    build: .
    container_name: gcs-emulator
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "true"
      DATABASE_URL: postgresql://gcs_user:gcs_password@postgres:5432/gcs_emulator
      STORAGE_PATH: ./storage
      LOG_LEVEL: INFO
    volumes:
      - ./storage:/app/storage
      - ./app:/app/app
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gcs-network
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 --reload wsgi:app

volumes:
  postgres_data:

networks:
  gcs-network:
    driver: bridge
